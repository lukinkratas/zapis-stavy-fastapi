info:
  name: login
  type: http
  seq: 4

http:
  method: POST
  url: http://127.0.0.1:8080/v1/auth/token
  body:
    type: multipart-form
    data:
      - name: username
        type: text
        value: "{{process.env.ZAPIS_STAVY_EMAIL}}"
      - name: password
        type: text
        value: "{{process.env.ZAPIS_STAVY_PASSWORD}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access_token", res.body.access_token);
        console.log("env var access_token set: " + res.body.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
