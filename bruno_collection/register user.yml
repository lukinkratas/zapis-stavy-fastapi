info:
  name: register user
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/register
  body:
    type: json
    data: |-
      {
        "email": "{{process.env.ZAPIS_STAVY_EMAIL}}",
        "password": "{{process.env.ZAPIS_STAVY_PASSWORD}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
