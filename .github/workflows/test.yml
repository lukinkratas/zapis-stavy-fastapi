name: Test

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test-dev:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Format check
        run: make fmtchk

      - name: Lint check
        run: make lintchk

      - name: Type check
        run: make typechk

      - name: Run unit tests
        run: make test
  test:
    runs-on: ubuntu-latest
    needs: test-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup docker
        uses: docker/setup-docker-action@v5

      - name: Run all tests
        run: make test-cov
