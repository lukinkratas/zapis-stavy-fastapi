services:
  api:
    build:
      context: .
      target: prod
    container_name: api
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/zapis-stavy-fastapi/logs
    depends_on:
      - postgres

  postgres:
    image: postgres:18
    container_name: db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  db-data:
